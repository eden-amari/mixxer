services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: musicmixxer-backend
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend,host.docker.internal
      CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      FRONTEND_URL: http://localhost:3000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: musicmixxer-frontend
    command: >
      sh -c "npm run dev -- --hostname 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    environment:
      MUSICMIXXER_BACKEND_URL: http://backend:8000
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
  frontend_next:
